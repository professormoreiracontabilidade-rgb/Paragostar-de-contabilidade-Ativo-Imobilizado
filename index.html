<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Para Gostar de Contabilidade - Ativo Imobilizado</title>
<style>
:root{
--azul:#052f72;--azul2:#0b57c2;--verde:#12ad52;--vermelho:#d71920;--laranja:#fb8c00;
--fundo:#edf3fb;--texto:#061b3a;--amarelo:#ffe066;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--fundo);color:var(--texto)}
body{max-width:430px;margin:0 auto;min-height:100vh;border-left:1px solid #d5dff0;border-right:1px solid #d5dff0}
.screen{display:none;min-height:100vh;padding:20px 18px 150px;overflow-y:auto}
.screen.active{display:block}
.capa{text-align:center;background:linear-gradient(180deg,#edf3fb,#fff)}
.icons{font-size:48px;margin-top:8px}
h1{font-size:31px;line-height:1.05;color:#052f72;margin:10px 0;font-weight:900}
h2{font-size:25px;color:#052f72;margin:0 0 16px;text-align:center}
.pill{display:inline-block;background:#052f72;color:#fff;font-size:22px;font-weight:900;padding:13px 20px;border-radius:20px;margin:12px 0}
.sub{font-size:20px;font-weight:900;color:#d71920;margin:18px 0}
.card,.lock,.qbox{background:#fff;border-radius:22px;padding:20px;box-shadow:0 8px 22px rgba(0,0,0,.14);border:2px solid rgba(5,47,114,.15)}
.lock{border:3px solid #052f72}
input{width:100%;height:54px;border:2px solid #ccd7ee;border-radius:14px;padding:0 14px;font-size:18px;margin:8px 0 14px}
.btnZap,.btnStart{border:0;border-radius:28px;height:58px;width:100%;font-size:21px;font-weight:900;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.18);margin-top:8px}
.btnZap{background:#12ad52}.btnStart{background:#052f72;display:none}
.note{font-size:15px;line-height:1.35;text-align:left;background:#fff7d6;border-left:6px solid #fb8c00;border-radius:12px;padding:12px;margin-top:14px}
.topo{text-align:center;color:#fff;background:linear-gradient(135deg,#052f72,#0b57c2);border-radius:0 0 24px 24px;padding:16px 12px;margin:-20px -18px 18px;font-weight:900}
.topo small{display:block;color:#ffe066;font-size:14px;margin-top:4px}
.qnum{display:inline-block;background:#d71920;color:#fff;padding:7px 14px;border-radius:999px;font-weight:900;margin-bottom:12px}
.question{font-size:20px;line-height:1.42;font-weight:850;margin:8px 0 16px}
.alt{display:block;width:100%;text-align:left;background:#fff;border:3px solid #dbe4f7;border-radius:18px;padding:14px;margin:10px 0;font-size:18.5px;line-height:1.28;font-weight:850;color:#061b3a}
.alt.correct{background:#e8f8ee;border-color:#12ad52}
.alt.wrong{background:#fff1f1;border-color:#d71920}
.feedback{display:none;margin-top:14px;border-radius:18px;padding:16px;font-size:18px;line-height:1.4;font-weight:700}
.feedback.show{display:block}.feedback.ok{background:#e8f8ee;border:3px solid #12ad52}.feedback.err{background:#fff1f1;border:3px solid #d71920}
.progress{position:fixed;top:8px;right:8px;background:#052f72;color:#fff;padding:5px 10px;border-radius:999px;font-size:13px;font-weight:900;z-index:9998}
.bar{height:10px;background:#dbe4f7;border-radius:999px;overflow:hidden;margin:12px 0 18px}.fill{height:100%;width:0;background:#12ad52;transition:.25s}
.nav-buttons{position:fixed;left:0;right:0;bottom:18px;padding:0 12px calc(env(safe-area-inset-bottom) + 10px);display:flex;gap:10px;z-index:9999;max-width:430px;margin:0 auto}
.nav-buttons button{flex:1;height:58px;border:none;border-radius:16px;color:#fff;font-size:17px;font-weight:900;box-shadow:0 5px 14px rgba(0,0,0,.28)}
#prev{background:#d71920}#home{background:#fb8c00}#next{background:#12ad52}
.result{font-size:25px;text-align:center;font-weight:900;color:#052f72}.small{font-size:16px;line-height:1.35}
</style>
</head>
<body>
<div class="progress" id="progress">Bloqueado</div>

<section class="screen capa active" id="lockScreen">
<div class="icons">📚 🏢</div>
<h1>Para Gostar de<br>Contabilidade</h1>
<div class="pill">Ativo Imobilizado</div>
<div class="sub">Professor Moreira</div>
<div class="lock">
<h2> Treinamento Pesado</h2>
<p class="small">"Disciplina é a ponte entre metas e realizações."</p>
<input id="nome" placeholder="Seu nome">
<input id="whats" placeholder="Seu WhatsApp">
<button class="btnZap" onclick="sendWhatsapp()">Enviar WhatsApp e liberar</button>
<button class="btnStart" id="startBtn" onclick="startQuiz()">COMEÇAR</button>
<div class="note">✅ O quiz salva automaticamente a questão em que você parou.</div>
</div>
</section>

<section class="screen" id="quizScreen">
<div class="topo">CURSO DE CONTABILIDADE<br>PROFESSOR MOREIRA<small>Ativo Imobilizado - CPC 27</small></div>
<div class="bar"><div class="fill" id="fill"></div></div>
<div class="qbox">
<div class="qnum" id="qnum"></div>
<div class="question" id="question"></div>
<div id="answers"></div>
<div class="feedback" id="feedback"></div>
</div>
</section>

<section class="screen" id="resultScreen">
<div class="topo">RESULTADO FINAL</div>
<div class="card">
<div class="result" id="resultText"></div>
<p class="small" id="resultMsg"></p>
<button class="btnZap" onclick="sendResult()">Enviar resultado no WhatsApp</button>
</div>
</section>

<div class="nav-buttons">
<button id="prev" onclick="prevQ()">◀ Voltar</button>
<button id="home" onclick="restart()">↺ Reiniciar</button>
<button id="next" onclick="nextQ()">Avançar ▶</button>
</div>

<script>
const PROFESSOR_WA="5561985323574";
const questions=[{"q": "Segundo o CPC 27, um item deve ser reconhecido como ativo imobilizado quando:", "alts": ["for destinado exclusivamente à revenda.", "gerar receita no mesmo mês da aquisição.", "for provável que benefícios econômicos futuros fluam para a entidade e seu custo puder ser mensurado confiavelmente.", "tiver vida útil inferior a um exercício social."], "ans": 2, "com": "O reconhecimento exige probabilidade de benefícios econômicos futuros e mensuração confiável do custo."}, {"q": "Assinale a alternativa que apresenta corretamente uma característica do ativo imobilizado.", "alts": ["É sempre destinado à revenda.", "É um item tangível mantido para uso nas atividades da entidade por mais de um período.", "É sempre um ativo financeiro.", "É classificado obrigatoriamente no ativo circulante."], "ans": 1, "com": "O imobilizado é tangível, usado na produção, prestação de serviços, aluguel a terceiros ou fins administrativos, por mais de um período."}, {"q": "Uma máquina comprada para uso na produção da empresa deve ser classificada como:", "alts": ["estoque.", "ativo imobilizado.", "ativo intangível.", "despesa antecipada."], "ans": 1, "com": "Como será usada na produção e não destinada à revenda, a máquina é ativo imobilizado."}, {"q": "Um veículo adquirido por uma concessionária para revenda deve ser classificado como:", "alts": ["ativo imobilizado.", "ativo intangível.", "estoque.", "investimento."], "ans": 2, "com": "Quando o bem é adquirido para venda no curso normal dos negócios, ele é estoque."}, {"q": "Integra o custo de aquisição de um item do ativo imobilizado:", "alts": ["propaganda de lançamento do produto.", "tributo recuperável.", "preço de aquisição e tributos não recuperáveis.", "despesa administrativa geral sem relação direta com o ativo."], "ans": 2, "com": "O custo inclui preço de aquisição, tributos não recuperáveis e gastos diretamente atribuíveis."}, {"q": "Os tributos recuperáveis pagos na aquisição de um equipamento devem ser tratados como:", "alts": ["custo do imobilizado.", "despesa de depreciação.", "direito a recuperar ou compensar, não compondo o custo do imobilizado.", "perda por redução ao valor recuperável."], "ans": 2, "com": "Tributos recuperáveis não fazem parte do custo do ativo."}, {"q": "Gastos com instalação e testes necessários para colocar uma máquina em condição de uso devem ser:", "alts": ["reconhecidos como despesa imediatamente.", "incluídos no custo do ativo imobilizado.", "classificados como estoque.", "registrados como ativo intangível."], "ans": 1, "com": "Gastos diretamente atribuíveis para colocar o ativo em condição de funcionamento integram o custo."}, {"q": "Gastos com propaganda, inauguração e treinamento de funcionários, em regra, devem ser tratados como:", "alts": ["custo obrigatório do imobilizado.", "despesas do período.", "redução do valor residual.", "depreciação acumulada."], "ans": 1, "com": "Esses gastos não colocam o ativo em condição de uso; normalmente são despesas."}, {"q": "Depreciação é:", "alts": ["o valor de venda do ativo.", "a alocação sistemática do valor depreciável ao longo da vida útil.", "a baixa imediata do ativo no resultado.", "o custo total do ativo."], "ans": 1, "com": "Depreciação distribui o valor depreciável do ativo durante sua vida útil."}, {"q": "O valor depreciável corresponde:", "alts": ["ao custo menos o valor residual.", "ao valor justo menos a receita de venda.", "ao valor de aquisição somado aos tributos recuperáveis.", "ao lucro obtido com a venda do ativo."], "ans": 0, "com": "Valor depreciável = custo ou valor substituto do custo menos valor residual."}, {"q": "Valor residual é:", "alts": ["o valor contábil inicial do ativo.", "o valor estimado que a entidade obteria pela venda do ativo ao final da vida útil, deduzidos os gastos estimados de venda.", "a despesa anual de depreciação.", "a perda por desvalorização do ativo."], "ans": 1, "com": "É o valor estimado de realização ao final da vida útil, líquido dos gastos de venda."}, {"q": "A depreciação de um ativo começa quando:", "alts": ["o ativo é pago integralmente.", "o ativo é adquirido, mesmo sem estar disponível para uso.", "o ativo está disponível para uso.", "a empresa decide vender o ativo."], "ans": 2, "com": "A depreciação inicia quando o ativo está no local e nas condições necessárias para operar."}, {"q": "A depreciação deve cessar quando:", "alts": ["o ativo fica temporariamente ocioso.", "o ativo é classificado como mantido para venda ou baixado, o que ocorrer primeiro.", "o ativo ainda possui benefícios econômicos futuros.", "o ativo é usado abaixo da capacidade normal."], "ans": 1, "com": "A depreciação cessa na classificação como mantido para venda ou na baixa."}, {"q": "O método de depreciação deve refletir:", "alts": ["a vontade da administração, independentemente do uso do ativo.", "o padrão de consumo dos benefícios econômicos futuros do ativo.", "apenas a legislação fiscal.", "sempre o método das unidades produzidas."], "ans": 1, "com": "O método deve representar o padrão esperado de consumo dos benefícios econômicos."}, {"q": "No método linear, a depreciação é caracterizada por:", "alts": ["despesa constante ao longo da vida útil, se não houver alteração nas estimativas.", "despesa sempre crescente.", "ausência de valor residual.", "baixa imediata do ativo."], "ans": 0, "com": "O método linear reconhece despesa constante quando as estimativas permanecem iguais."}, {"q": "A vida útil de um ativo é:", "alts": ["sempre igual à vida física máxima do bem.", "o período em que a entidade espera utilizar o ativo ou o número de unidades que espera produzir.", "sempre determinada pela nota fiscal.", "irrelevante para a depreciação."], "ans": 1, "com": "Vida útil pode ser tempo de uso esperado ou quantidade de produção esperada."}, {"q": "Vida útil, valor residual e método de depreciação devem ser revisados:", "alts": ["apenas quando o ativo for vendido.", "pelo menos ao final de cada exercício.", "somente a cada cinco anos.", "nunca, pois são imutáveis."], "ans": 1, "com": "O CPC 27 exige revisão ao menos ao final de cada exercício."}, {"q": "Alteração na vida útil estimada de uma máquina deve ser tratada como:", "alts": ["erro contábil com ajuste retroativo obrigatório.", "mudança de estimativa contábil com efeito prospectivo.", "receita operacional.", "redução automática do custo histórico."], "ans": 1, "com": "Mudanças em estimativas são aplicadas prospectivamente."}, {"q": "Terrenos e edifícios adquiridos em conjunto devem ser contabilizados:", "alts": ["sempre em uma única conta indivisível.", "separadamente, pois são ativos separáveis.", "como estoque, independentemente do uso.", "como despesa no momento da compra."], "ans": 1, "com": "Terrenos e edifícios são ativos separáveis e devem ser contabilizados separadamente."}, {"q": "Em regra, terrenos:", "alts": ["sofrem depreciação obrigatória mensal.", "não sofrem depreciação, salvo situações específicas de vida útil limitada.", "devem ser classificados como intangível.", "são sempre estoques."], "ans": 1, "com": "Terrenos normalmente têm vida útil indefinida e não são depreciados."}, {"q": "Peças de reposição importantes podem ser classificadas no ativo imobilizado quando:", "alts": ["forem usadas por mais de um período e atenderem aos critérios de reconhecimento.", "forem materiais de consumo imediato.", "forem compradas para revenda.", "não puderem ser mensuradas."], "ans": 0, "com": "Peças relevantes usadas por mais de um período podem ser imobilizadas."}, {"q": "Manutenção rotineira de uma máquina deve ser reconhecida, em regra, como:", "alts": ["ativo imobilizado.", "despesa do período.", "ativo intangível.", "reserva de reavaliação."], "ans": 1, "com": "Manutenção rotineira apenas conserva o ativo; normalmente é despesa."}, {"q": "A substituição relevante de uma parte de um equipamento pode ser capitalizada quando:", "alts": ["atender aos critérios de reconhecimento de ativo.", "for apenas limpeza comum.", "não gerar benefícios econômicos futuros.", "for propaganda institucional."], "ans": 0, "com": "Substituições relevantes podem ser capitalizadas se gerarem benefícios futuros e forem mensuráveis."}, {"q": "Quando uma parte relevante de um ativo é substituída, a parte antiga deve ser:", "alts": ["mantida no ativo para sempre.", "baixada do valor contábil.", "reclassificada como receita.", "somada novamente ao custo do ativo."], "ans": 1, "com": "A parte substituída deve ser baixada para evitar duplicidade no ativo."}, {"q": "No modelo do custo, o ativo imobilizado é apresentado por:", "alts": ["custo menos depreciação acumulada e perdas por redução ao valor recuperável.", "valor de venda sem qualquer ajuste.", "valor residual apenas.", "custo somado à depreciação acumulada."], "ans": 0, "com": "No modelo do custo: custo menos depreciação acumulada e impairment acumulado."}, {"q": "O teste de recuperabilidade tem relação com:", "alts": ["verificar se o ativo está registrado acima do valor recuperável.", "aumentar livremente o valor do ativo.", "substituir a depreciação.", "registrar tributos recuperáveis no custo."], "ans": 0, "com": "O impairment evita que o ativo fique registrado por valor superior ao recuperável."}, {"q": "A baixa de um ativo imobilizado ocorre quando:", "alts": ["ele é alienado ou não há expectativa de benefícios econômicos futuros.", "ele ainda está em pleno uso.", "ele é apenas limpo ou revisado.", "a depreciação mensal é registrada."], "ans": 0, "com": "O ativo é baixado na alienação ou quando não se esperam benefícios futuros."}, {"q": "O ganho ou a perda na baixa de um ativo imobilizado deve ser reconhecido:", "alts": ["diretamente no capital social.", "no resultado, salvo disposição específica em contrário.", "sempre como estoque.", "como depreciação acumulada."], "ans": 1, "com": "A diferença entre valor líquido de venda e valor contábil é reconhecida no resultado."}, {"q": "Assinale a alternativa correta sobre ativo imobilizado.", "alts": ["Todo imobilizado é destinado à venda imediata.", "A depreciação começa quando o ativo está disponível para uso.", "Valor residual sempre é zero.", "Terrenos sempre são depreciados."], "ans": 1, "com": "A depreciação começa quando o ativo está disponível para uso."}, {"q": "A principal pegadinha sobre ativo imobilizado em provas é confundir:", "alts": ["bem de uso com bem destinado à revenda.", "ativo com passivo financeiro.", "receita com patrimônio líquido.", "caixa com banco."], "ans": 0, "com": "Bem usado pela entidade tende a ser imobilizado; bem comprado para revenda é estoque."}];
let idx=parseInt(localStorage.getItem("pm_premium_ai_idx")||"0");
let score=parseInt(localStorage.getItem("pm_premium_ai_score")||"0");
let answered=JSON.parse(localStorage.getItem("pm_premium_ai_answered")||"{}");
let unlocked=localStorage.getItem("pm_premium_ai_unlocked")==="yes";
const lockScreen=document.getElementById("lockScreen"),quizScreen=document.getElementById("quizScreen"),resultScreen=document.getElementById("resultScreen"),progress=document.getElementById("progress");
function showScreen(s){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));s.classList.add("active");window.scrollTo(0,0)}
function sendWhatsapp(){
 const nome=document.getElementById("nome").value.trim(), whats=document.getElementById("whats").value.trim();
 if(!nome||!whats){alert("Preencha nome e WhatsApp para liberar o quiz.");return}
 localStorage.setItem("pm_premium_ai_nome",nome);localStorage.setItem("pm_premium_ai_whats",whats);localStorage.setItem("pm_premium_ai_unlocked","yes");unlocked=true;
 const msg=encodeURIComponent("Professor Moreira, quero iniciar o Quiz Premium: Para Gostar de Contabilidade - Ativo Imobilizado.%0ANome: "+nome+"%0AWhatsApp: "+whats);
 window.open("https://wa.me/"+PROFESSOR_WA+"?text="+msg,"_blank");
 document.getElementById("startBtn").style.display="block";
}
function startQuiz(){showScreen(quizScreen);render()}
function render(){
 if(idx>=questions.length){finish();return}
 const q=questions[idx];progress.textContent=(idx+1)+"/"+questions.length;
 document.getElementById("fill").style.width=((idx+1)/questions.length*100)+"%";
 document.getElementById("qnum").textContent="Questão "+(idx+1)+" de "+questions.length;
 document.getElementById("question").textContent=q.q;
 const answers=document.getElementById("answers");answers.innerHTML="";
 q.alts.forEach((a,i)=>{const b=document.createElement("button");b.className="alt";b.textContent=String.fromCharCode(65+i)+") "+a;b.onclick=()=>answer(i);
 if(answered[idx]!==undefined){b.disabled=true;if(i===q.ans)b.classList.add("correct");if(i===answered[idx]&&i!==q.ans)b.classList.add("wrong")}answers.appendChild(b)});
 const fb=document.getElementById("feedback");fb.className="feedback";fb.innerHTML="";
 if(answered[idx]!==undefined){const ok=answered[idx]===q.ans;fb.classList.add("show",ok?"ok":"err");fb.innerHTML=(ok?"✅ Resposta correta!":"❌ Resposta incorreta.")+"<br><br>"+q.com}
 localStorage.setItem("pm_premium_ai_idx",idx);
}
function answer(i){if(answered[idx]!==undefined)return;answered[idx]=i;if(i===questions[idx].ans)score++;localStorage.setItem("pm_premium_ai_answered",JSON.stringify(answered));localStorage.setItem("pm_premium_ai_score",score);render()}
function nextQ(){if(!unlocked)return;if(idx<questions.length-1){idx++;localStorage.setItem("pm_premium_ai_idx",idx);render()}else finish()}
function prevQ(){if(!unlocked)return;if(idx>0){idx--;localStorage.setItem("pm_premium_ai_idx",idx);render()}}
function restart(){if(confirm("Deseja reiniciar o quiz desde a primeira questão?")){idx=0;score=0;answered={};localStorage.setItem("pm_premium_ai_idx","0");localStorage.setItem("pm_premium_ai_score","0");localStorage.setItem("pm_premium_ai_answered",JSON.stringify(answered));showScreen(quizScreen);render()}}
function finish(){showScreen(resultScreen);progress.textContent="Final";document.getElementById("resultText").textContent="Você acertou "+score+" de "+questions.length;let pct=Math.round(score/questions.length*100);document.getElementById("resultMsg").textContent="Aproveitamento: "+pct+"%. Continue treinando no CFC na palma da mão."}
function sendResult(){const nome=localStorage.getItem("pm_premium_ai_nome")||"Aluno",whats=localStorage.getItem("pm_premium_ai_whats")||"";const msg=encodeURIComponent("Professor Moreira, finalizei o Quiz Premium - Ativo Imobilizado.%0ANome: "+nome+"%0AWhatsApp: "+whats+"%0AResultado: "+score+" de "+questions.length);window.open("https://wa.me/"+PROFESSOR_WA+"?text="+msg,"_blank")}
window.onload=()=>{if(unlocked){document.getElementById("startBtn").style.display="block";showScreen(quizScreen);render()}};
</script>
</body>
</html>
